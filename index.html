<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Routify Premium</title>

<!-- FONT -->
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- LEAFLET -->
<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<!-- CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <!-- =====================================
    SIDEBAR
    ===================================== -->

    <aside class="sidebar">

        <!-- LOGO -->

        <div class="logo">

            <h1>Routify</h1>

            <p>
                Sistema inteligente de entregas
            </p>

        </div>

        <!-- DASHBOARD -->

        <div class="dashboard">

            <div class="card">

                <span>
                    Total Entregas
                </span>

                <h2 id="totalDeliveries">
                    0
                </h2>

            </div>

            <div class="card">

                <span>
                    Bairros
                </span>

                <h2 id="groupedStreets">
                    0
                </h2>

            </div>

            <div class="card">

                <span>
                    Em Rota
                </span>

                <h2 id="inRoute">
                    0
                </h2>

            </div>

            <div class="card">

                <span>
                    Concluídas
                </span>

                <h2 id="completedRoutes">
                    0
                </h2>

            </div>

        </div>

        <!-- IMPORTAÇÃO -->

        <div class="upload-area">

            <label
                for="excelFile"
                class="upload-btn"
            >
                📂 Importar Excel
            </label>

            <input
                type="file"
                id="excelFile"
                accept=".xlsx,.xls,.csv"
            >

            <!-- BOTÕES -->

            <div class="route-actions">

                <button
                    id="loadRoutesBtn"
                    class="btn primary"
                >
                    🚚 Carregar
                </button>

                <button
                    id="groupRoutesBtn"
                    class="btn secondary"
                >
                    📍 Agrupar
                </button>

                <button
                    id="startRouteBtn"
                    class="btn success"
                >
                    ▶ Iniciar
                </button>

                <button
                    id="stopRouteBtn"
                    class="btn danger"
                >
                    ⏹ Encerrar
                </button>

            </div>

            <!-- PROGRESSO -->

            <div class="progress-container">

                <div
                    class="progress-fill"
                    id="progressFill"
                ></div>

            </div>

            <div
                class="progress-text"
                id="progressText"
            >
                0%
            </div>

        </div>

        <!-- BUSCA -->

        <div class="search-box">

            <input
                type="text"
                id="searchInput"
                placeholder="Buscar bairro ou entrega..."
            >

        </div>

        <!-- LISTA -->

        <div
            class="list"
            id="deliveryList"
        >

        </div>

        <!-- FOOTER -->

        <div class="footer">

            Routify Premium © 2026

        </div>

    </aside>

    <!-- =====================================
    MAPA
    ===================================== -->

    <main class="map-container">

        <!-- TOPBAR -->

        <div class="topbar">

            <h2>
                📍 Mapa Inteligente
            </h2>

            <p>

                Agrupamento automático
                por bairros com abertura
                rápida no Waze e acompanhamento
                em tempo real.

            </p>

        </div>

        <!-- MAPA -->

        <div id="map"></div>

        <!-- FLOAT BUTTON -->

        <button
            class="floating-btn"
            onclick="locateUser()"
        >
            📍
        </button>

    </main>

</div>

<!-- =====================================
LEAFLET
===================================== -->

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<!-- =====================================
XLSX
===================================== -->

<script
src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js">
</script>

<!-- =====================================
SCRIPT
===================================== -->

<script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Routify - Sistema Inteligente de Entregas</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<!-- Fonte -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">

        <div class="logo">
            <h1>Routify</h1>
            <p>Entregas inteligentes em tempo real</p>
        </div>

        <!-- Dashboard -->
        <div class="dashboard">

            <div class="card">
                <span>Entregas Hoje</span>
                <h2 id="totalDeliveries">0</h2>
            </div>

            <div class="card">
                <span>Ruas Agrupadas</span>
                <h2 id="groupedStreets">0</h2>
            </div>

            <div class="card">
                <span>Em Rota</span>
                <h2>12</h2>
            </div>

            <div class="card">
                <span>Concluídas</span>
                <h2>28</h2>
            </div>

        </div>

        <!-- Upload -->
        <div class="upload">
            <label for="excelFile">
                Importar Planilha Excel
            </label>

            <input type="file" id="excelFile" accept=".xlsx,.xls,.csv"/>
        </div>

        <!-- Lista -->
        <div class="list" id="deliveryList">

        </div>

    </div>

    <!-- Map -->
    <div class="map-container">

        <div class="topbar">
            <h2>Mapa Inteligente</h2>

            <p>
                O Routify identifica automaticamente entregas na mesma rua
                e agrupa as rotas para otimizar tempo e combustível.
            </p>
        </div>

        <div id="map"></div>

    </div>

</div>

<!-- Scripts -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="script.js"></script>

</body>
</html>

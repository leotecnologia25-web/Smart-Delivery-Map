<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Routify - Sistema Inteligente de Entregas</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<!-- Fonte -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#0f172a;
    color:white;
    overflow:hidden;
}

/* Layout */

.container{
    display:flex;
    width:100%;
    height:100vh;
}

/* Sidebar */

.sidebar{
    width:380px;
    background:#111827;
    border-right:1px solid #1f2937;
    display:flex;
    flex-direction:column;
}

.logo{
    padding:25px;
    border-bottom:1px solid #1f2937;
}

.logo h1{
    font-size:32px;
    font-weight:700;
    color:#3b82f6;
}

.logo p{
    color:#94a3b8;
    margin-top:8px;
    font-size:14px;
}

/* Dashboard */

.dashboard{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    padding:20px;
}

.card{
    background:#1e293b;
    padding:18px;
    border-radius:18px;
    border:1px solid #334155;
}

.card span{
    color:#94a3b8;
    font-size:13px;
}

.card h2{
    margin-top:10px;
    font-size:28px;
}

/* Upload */

.upload{
    padding:0 20px 20px;
}

.upload label{
    display:block;
    width:100%;
    background:#2563eb;
    padding:15px;
    text-align:center;
    border-radius:15px;
    cursor:pointer;
    font-weight:600;
    transition:.3s;
}

.upload label:hover{
    background:#1d4ed8;
}

.upload input{
    display:none;
}

/* Lista */

.list{
    flex:1;
    overflow:auto;
    padding:20px;
}

.delivery{
    background:#1e293b;
    border:1px solid #334155;
    padding:18px;
    border-radius:20px;
    margin-bottom:15px;
    transition:.3s;
}

.delivery:hover{
    border-color:#3b82f6;
}

.delivery h3{
    font-size:18px;
}

.delivery p{
    color:#94a3b8;
    margin-top:6px;
    font-size:14px;
}

.street-badge{
    margin-top:15px;
    background:#1e40af;
    display:inline-block;
    padding:8px 12px;
    border-radius:12px;
    font-size:12px;
    font-weight:600;
}

.status{
    margin-top:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.tag{
    padding:7px 14px;
    border-radius:999px;
    font-size:12px;
    font-weight:700;
}

.pending{
    background:#dc2626;
}

.route{
    background:#eab308;
    color:black;
}

.done{
    background:#16a34a;
}

.route-btn{
    background:#2563eb;
    border:none;
    color:white;
    padding:10px 14px;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
}

/* Map */

.map-container{
    flex:1;
    position:relative;
}

#map{
    width:100%;
    height:100%;
}

/* Topbar */

.topbar{
    position:absolute;
    top:20px;
    left:20px;
    z-index:999;
    background:rgba(15,23,42,.95);
    backdrop-filter:blur(10px);
    border:1px solid #334155;
    padding:20px;
    border-radius:20px;
    width:320px;
}

.topbar h2{
    font-size:24px;
}

.topbar p{
    margin-top:10px;
    color:#94a3b8;
    line-height:1.5;
}

/* Mobile */

@media(max-width:900px){

.container{
    flex-direction:column;
}

.sidebar{
    width:100%;
    height:45vh;
}

.map-container{
    height:55vh;
}

.dashboard{
    grid-template-columns:1fr 1fr;
}

.topbar{
    width:90%;
}

}

</style>
</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">

        <div class="logo">
            <h1>Routify</h1>
            <p>Entregas inteligentes em tempo real</p>
        </div>

        <!-- Dashboard -->
        <div class="dashboard">

            <div class="card">
                <span>Entregas Hoje</span>
                <h2 id="totalDeliveries">0</h2>
            </div>

            <div class="card">
                <span>Ruas Agrupadas</span>
                <h2 id="groupedStreets">0</h2>
            </div>

            <div class="card">
                <span>Em Rota</span>
                <h2>12</h2>
            </div>

            <div class="card">
                <span>Concluídas</span>
                <h2>28</h2>
            </div>

        </div>

        <!-- Upload -->
        <div class="upload">
            <label for="excelFile">
                Importar Planilha Excel
            </label>

            <input type="file" id="excelFile" accept=".xlsx,.xls,.csv"/>
        </div>

        <!-- Lista -->
        <div class="list" id="deliveryList">

        </div>

    </div>

    <!-- Map -->
    <div class="map-container">

        <div class="topbar">
            <h2>Mapa Inteligente</h2>

            <p>
                O Routify identifica automaticamente entregas na mesma rua
                e agrupa as rotas para otimizar tempo e combustível.
            </p>
        </div>

        <div id="map"></div>

    </div>

</div>

<!-- Scripts -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>

// Inicializar mapa

const map = L.map('map').setView([-2.5307, -44.3068], 13);

// OpenStreetMap

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap'
}).addTo(map);

// Dados exemplo

const deliveries = [
    {
        client:"João Silva",
        street:"Rua da Paz",
        number:"120",
        district:"Centro",
        lat:-2.5307,
        lng:-44.3068,
        status:"pending"
    },
    {
        client:"Maria Souza",
        street:"Rua da Paz",
        number:"150",
        district:"Centro",
        lat:-2.5312,
        lng:-44.3070,
        status:"route"
    },
    {
        client:"Carlos Lima",
        street:"Rua Verde",
        number:"20",
        district:"Renascença",
        lat:-2.5400,
        lng:-44.3000,
        status:"done"
    }
];

// Agrupar ruas

const streetGroups = {};

deliveries.forEach(item => {

    if(!streetGroups[item.street]){
        streetGroups[item.street] = 0;
    }

    streetGroups[item.street]++;

});

// Dashboard

document.getElementById("totalDeliveries").innerHTML = deliveries.length;
document.getElementById("groupedStreets").innerHTML = Object.keys(streetGroups).length;

// Lista

const deliveryList = document.getElementById("deliveryList");

deliveries.forEach(item => {

    let tagClass = "";

    if(item.status === "pending"){
        tagClass = "pending";
    }

    if(item.status === "route"){
        tagClass = "route";
    }

    if(item.status === "done"){
        tagClass = "done";
    }

    deliveryList.innerHTML += `
    
    <div class="delivery">

        <h3>${item.client}</h3>

        <p>${item.street}, ${item.number}</p>

        <p>${item.district}</p>

        <div class="street-badge">
            ${streetGroups[item.street]} entregas nesta rua
        </div>

        <div class="status">

            <div class="tag ${tagClass}">
                ${item.status}
            </div>

            <button class="route-btn">
                Ver rota
            </button>

        </div>

    </div>
    
    `;

});

// Marcadores

deliveries.forEach(item => {

    let color = "red";

    if(item.status === "route"){
        color = "orange";
    }

    if(item.status === "done"){
        color = "green";
    }

    const marker = L.circleMarker([item.lat, item.lng],{
        radius:12,
        color:color,
        fillColor:color,
        fillOpacity:0.8
    }).addTo(map);

    marker.bindPopup(`
        <b>${item.client}</b><br>
        ${item.street}, ${item.number}<br>
        ${streetGroups[item.street]} entregas nesta rua
    `);

});

// Importar Excel

document.getElementById('excelFile').addEventListener('change', function(e){

    const file = e.target.files[0];

    const reader = new FileReader();

    reader.onload = function(event){

        const data = new Uint8Array(event.target.result);

        const workbook = XLSX.read(data, {type:'array'});

        const sheet = workbook.Sheets[workbook.SheetNames[0]];

        const json = XLSX.utils.sheet_to_json(sheet);

        console.log(json);

        alert("Planilha importada com sucesso!");

    };

    reader.readAsArrayBuffer(file);

});

</script>

</body>
</html>

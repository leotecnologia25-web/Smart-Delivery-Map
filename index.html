<div class="route-actions">

<!-- CONTROLE DE ROTAS -->

<div class="live-route-container">

    <div class="live-title">

        <h3>
            🚚 Controle de Rotas
        </h3>

        <span class="online-status">
            ● Tempo Real
        </span>

    </div>

    <!-- BOTÕES -->

    <div class="live-route-actions">

        <button id="startRouteBtn"
            class="live-route-btn">

            ▶️ Iniciar Rota

        </button>

        <button id="pauseRouteBtn"
            class="pause-route-btn">

            ⏸️ Pausar

        </button>

        <button id="stopRouteBtn"
            class="stop-route-btn">

            ⏹️ Encerrar

        </button>

    </div>

    <!-- STATUS -->

    <div class="route-status-box">

        <div class="status-left">

            <div class="status-indicator"
                id="routeIndicator">
            </div>

            <div>

                <h4>
                    Status Atual
                </h4>

                <p id="routeStatusText">
                    Aguardando rota
                </p>

            </div>

        </div>

        <div class="status-right">

            <h2 id="progressPercent">
                0%
            </h2>

        </div>

    </div>

    <!-- PROGRESSO -->

    <div class="progress-container">

        <div class="progress-bar">

            <div id="progressFill"
                class="progress-fill">
            </div>

        </div>

    </div>

    <!-- CARDS -->

    <div class="route-info-grid">

        <div class="route-info-card">

            <span>
                🚚 Próxima Entrega
            </span>

            <h4 id="nextDelivery">
                ---
            </h4>

        </div>

        <div class="route-info-card">

            <span>
                📍 Bairro Atual
            </span>

            <h4 id="currentDistrict">
                ---
            </h4>

        </div>

        <div class="route-info-card">

            <span>
                ⏱️ Tempo Restante
            </span>

            <h4 id="estimatedTime">
                ---
            </h4>

        </div>

    </div>

</div>

CSS

<style>

/* =========================================
ROTA TEMPO REAL
========================================= */

.live-route-container{

    margin-top:20px;

    background:#1e293b;

    border:1px solid #334155;

    border-radius:22px;

    padding:20px;

}

/* =========================================
TÍTULO
========================================= */

.live-title{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:18px;

}

.live-title h3{

    font-size:18px;

    background:#14532d;

    padding:6px 12px;

    border-radius:999px;

    font-size:11px;

    font-weight:700;

}

/* =========================================
BOTÕES
========================================= */

.live-route-actions{

    gap:10px;

}

BOTÃO START

    height:52px;

    background:linear-gradient(

    transform:translateY(-2px);

/* =========================================
BOTÃO PAUSE
========================================= */

.pause-route-btn{

    flex:1;

    height:52px;

    border:none;

    border-radius:16px;

    background:linear-gradient(
        135deg,
        #eab308,
        #facc15
    );

    color:#111827;

    font-weight:700;

    cursor:pointer;

}

/* =========================================
BOTÃO STOP
========================================= */

.stop-route-btn{

    flex:1;

    height:52px;

    border:none;

    border-radius:16px;

    background:linear-gradient(
        135deg,
        #dc2626,
        #ef4444
    );

    color:white;

    font-weight:700;

    cursor:pointer;

}

/* =========================================
STATUS BOX
========================================= */

.route-status-box{

    margin-top:20px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    background:#0f172a;

    border:1px solid #334155;

    border-radius:18px;

    display:flex;

    align-items:center;

    gap:15px;

    width:18px;

    border-radius:50%;

    background:#64748b;

<!-- =========================================
JAVASCRIPT
ADICIONE ANTES DE </script>
========================================= -->

<script>

/* =========================================
ELEMENTOS ROTA
========================================= */

const startRouteBtn =
document.getElementById("startRouteBtn");

const pauseRouteBtn =
document.getElementById("pauseRouteBtn");

const stopRouteBtn =
document.getElementById("stopRouteBtn");

const routeStatusText =
document.getElementById("routeStatusText");

const progressFill =
document.getElementById("progressFill");

const progressPercent =
document.getElementById("progressPercent");

const nextDelivery =
document.getElementById("nextDelivery");

const currentDistrict =
document.getElementById("currentDistrict");

const estimatedTime =
document.getElementById("estimatedTime");

const routeIndicator =
document.getElementById("routeIndicator");

/* =========================================
CONTROLE
========================================= */

let currentRouteIndex = 0;

let routeRunning = false;

let routePaused = false;

let routeTimeout;

/* =========================================
INICIAR
========================================= */

startRouteBtn.addEventListener(
    "click",
    startRoute
);

function startRoute(){

    if(importedRoutes.length === 0){

        alert(
            "Importe uma planilha primeiro."
        );

        return;

    }

    if(routeRunning){

        return;

    }

    routeRunning = true;

    routePaused = false;

    routeStatusText.innerHTML =
    "Rota em andamento";

    routeIndicator.classList.add(
        "status-active"
    );

    runRoute();

}

/* =========================================
EXECUTAR
========================================= */

function runRoute(){

    if(routePaused){

        return;

    }

    if(currentRouteIndex >= importedRoutes.length){

        finishRoute();

        return;

    }

    const route =
    importedRoutes[currentRouteIndex];

    nextDelivery.innerHTML =
    route.atId;

    currentDistrict.innerHTML =
    route.bairro;

    estimatedTime.innerHTML =
    (
        (
            importedRoutes.length
            -
            currentRouteIndex
        ) * 4
    ) + " min";

    const progress =
    (
        (
            currentRouteIndex + 1
        )
        /
        importedRoutes.length
    ) * 100;

    progressFill.style.width =
    progress + "%";

    progressPercent.innerHTML =
    Math.round(progress) + "%";

    map.flyTo(
        [
            route.latitude,
            route.longitude
        ],
        16
    );

    const marker =
    L.marker([
        route.latitude,
        route.longitude
    ]).addTo(map);

    marker.bindPopup(`

        <b>
            🚚 ${route.atId}
        </b>

        <br><br>

        Bairro:
        ${route.bairro}

        <br>

        Cidade:
        ${route.city}

    `).openPopup();

    currentRouteIndex++;

    routeTimeout =
    setTimeout(() => {

        runRoute();

    },4000);

}

/* =========================================
PAUSAR
========================================= */

pauseRouteBtn.addEventListener(
    "click",
    pauseRoute
);

function pauseRoute(){

    routePaused = true;

    clearTimeout(routeTimeout);

    routeStatusText.innerHTML =
    "Rota pausada";

}

/* =========================================
ENCERRAR
========================================= */

stopRouteBtn.addEventListener(
    "click",
    stopRoute
);

function stopRoute(){

    clearTimeout(routeTimeout);

    routeRunning = false;

    routePaused = false;

    currentRouteIndex = 0;

    routeStatusText.innerHTML =
    "Rota encerrada";

    routeIndicator.classList.remove(
        "status-active"
    );

    progressFill.style.width =
    "0%";

    progressPercent.innerHTML =
    "0%";

}

/* =========================================
FINALIZAR
========================================= */

function finishRoute(){

    routeRunning = false;

    routePaused = false;

    routeStatusText.innerHTML =
    "Rota concluída";

    progressFill.style.width =
    "100%";

    progressPercent.innerHTML =
    "100%";

    routeIndicator.classList.remove(
        "status-active"
    );

    nextDelivery.innerHTML =
    "Entregas concluídas";

    currentDistrict.innerHTML =
    "---";

    estimatedTime.innerHTML =
    "0 min";

    alert(
        "Rota finalizada!"
    );

}

</script>
